<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>クイックメモ | notia</title>

  <meta
    name="description"
    content="タイトルなしで素早く書ける、notiaのクイックメモページです。"
  />

  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
</head>

<body>

  <div id="commonHeader"></div>
<script type="module" src="/header.js"></script>
  
  <header class="site-header">
    <div>
      <p class="label">QUICK MEMO</p>
      <h1>クイックメモ</h1>
      <p class="lead">
        タイトルなし。1行目をタイトルとして扱う、文字だけのメモ。
      </p>
    </div>

    <div class="auth-area">
      <a href="/home/" class="back-link">Homeへ</a>
      <button id="loginBtn">Googleでログイン</button>
      <button id="logoutBtn" class="hidden">ログアウト</button>
      <p id="userInfo" class="user-info"></p>
    </div>
  </header>

  <main class="container quick-layout">
    <aside class="folder-panel">
      <div class="panel-head">
        <h2>フォルダ</h2>
        <button id="addFolderBtn" class="small-btn">＋</button>
      </div>

      <div id="folderList" class="folder-list">
        <button class="folder-item active" data-folder="all">すべて</button>
      </div>
    </aside>

    <section class="memo-panel">
      <div class="memo-toolbar">
        <input
          type="text"
          id="searchInput"
          placeholder="メモを検索"
        />

        <select id="folderSelect">
          <option value="">フォルダなし</option>
        </select>

        <button id="newMemoBtn">新規メモ</button>
      </div>

      <div class="memo-body">
        <div class="memo-list-wrap">
          <h2>メモ一覧</h2>
          <div id="memoList" class="memo-list"></div>
        </div>

        <div class="editor-wrap">
          <textarea
            id="memoEditor"
            placeholder="ここにメモを書く&#10;1行目がタイトルになります"
          ></textarea>

          <div class="editor-actions">

  <p id="saveStatus">未保存</p>

  <button id="copyMemoBtn" class="sub-btn">コピー</button>

  <button id="shareMemoBtn" class="sub-btn hidden">共有</button>

  <button id="unshareMemoBtn" class="danger-btn hidden">共有解除</button>

  <button id="deleteMemoBtn" class="danger-btn">削除</button>

  <button id="saveMemoBtn">保存</button>

</div>

          <div id="shareBox" class="share-box hidden">
            <p>共有URL</p>

            <div class="share-url-row">
              <input type="text" id="shareUrlInput" readonly />
              <button id="copyShareUrlBtn">コピー</button>
            </div>

            <small>
              共有したメモはコピーとして公開されます。元メモ本体は公開されません。
            </small>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/quick.js"></script>
</body>
</html>
