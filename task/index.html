<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>タスク | notia</title>

  <meta
    name="description"
    content="やることを軽く置いて、終わったら完了にできるnotiaのタスク管理ページです。"
  />

  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
</head>

<body>
  <header class="site-header">
    <div>
      <p class="label">TASK</p>
      <h1>タスク</h1>
      <p class="lead">
        やることを軽く置いて、終わったら完了にするシンプルなタスク管理。
      </p>
    </div>

    <div class="auth-area">
      <a href="/home/" class="back-link">Homeへ</a>
      <button id="loginBtn">Googleでログイン</button>
      <button id="logoutBtn" class="hidden">ログアウト</button>
      <p id="userInfo" class="user-info"></p>
    </div>
  </header>

  <main class="container task-layout">
    <section class="task-form-panel">
      <h2>タスク追加</h2>

      <input
        type="text"
        id="taskTitleInput"
        placeholder="やること"
      />

      <textarea
        id="taskMemoInput"
        placeholder="補足メモ"
      ></textarea>

      <div class="task-form-row">
        <input
          type="date"
          id="taskDueInput"
        />

        <input
          type="text"
          id="taskCategoryInput"
          placeholder="カテゴリ"
        />
      </div>

      <button id="addTaskBtn">追加</button>
      <p id="taskStatusText">ログインしてください</p>
    </section>

    <section class="task-list-panel">
      <div class="task-toolbar">
        <input
          type="text"
          id="taskSearchInput"
          placeholder="タスクを検索"
        />

        <select id="taskFilterSelect">
          <option value="todo">未完了</option>
          <option value="done">完了</option>
          <option value="all">すべて</option>
        </select>
      </div>

      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <script type="module" src="/task.js"></script>
</body>
</html>
