<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>タスク | notia</title>

  <meta
    name="description"
    content="やることを軽く置いて、終わったら完了にできるnotiaのタスク管理ページです。"
  />

  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
</head>

<body>
  <div id="commonHeader"></div>
  <script type="module" src="/header.js"></script>

  <header class="site-header">
    <div>
      <p class="label">TASK</p>
      <h1>タスク</h1>
      <p class="lead">
        やることを軽く置いて、グループごとに整理できるタスク管理。
      </p>
    </div>

    <div class="auth-area">
      <a href="/home/" class="back-link">Homeへ</a>
      <button id="loginBtn">Googleでログイン</button>
      <button id="logoutBtn" class="hidden">ログアウト</button>
      <p id="userInfo" class="user-info"></p>
    </div>
  </header>

  <main class="container task-layout">
    <aside class="task-form-panel">
      <section class="task-mini-section">
        <h2>グループ追加</h2>

        <input
          type="text"
          id="groupTitleInput"
          placeholder="例：OCFAのタスク"
        />

        <textarea
          id="groupDescriptionInput"
          placeholder="説明・目的・メモなど"
        ></textarea>

        <input
          type="url"
          id="groupLinkInput"
          placeholder="関連リンク（任意）"
        />

        <button id="addGroupBtn" class="task-sub-btn">グループ追加</button>
      </section>

      <section class="task-mini-section">
        <h2>タスク追加</h2>

        <input
          type="text"
          id="taskTitleInput"
          placeholder="やること"
        />

        <textarea
          id="taskMemoInput"
          placeholder="補足メモ"
        ></textarea>

        <div class="task-form-row">
          <input
            type="date"
            id="taskDueInput"
          />

          <input
            type="text"
            id="taskCategoryInput"
            placeholder="カテゴリ"
          />

          <select id="taskGroupSelect">
            <option value="">グループなし</option>
          </select>
        </div>

        <button id="addTaskBtn">追加</button>
        <p id="taskStatusText">ログインしてください</p>
      </section>
    </aside>

    <section class="task-list-panel">
      <div class="task-toolbar">
        <input
          type="text"
          id="taskSearchInput"
          placeholder="タスク・グループを検索"
        />

        <select id="taskFilterSelect">
          <option value="todo">未完了</option>
          <option value="done">完了</option>
          <option value="all">すべて</option>
        </select>
      </div>

      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <div id="taskEditModal" class="task-modal hidden">
  <div class="task-modal-bg" id="taskEditModalBg"></div>

  <div class="task-modal-box">
    <h2>タスク編集</h2>

    <input
      type="text"
      id="editTaskTitleInput"
      placeholder="タスク名"
    />

    <textarea
      id="editTaskMemoInput"
      placeholder="メモ"
    ></textarea>

    <input
      type="date"
      id="editTaskDueInput"
    />

    <input
      type="text"
      id="editTaskCategoryInput"
      placeholder="カテゴリ"
    />

    <select id="editTaskGroupSelect">
      <option value="">グループなし</option>
    </select>

    <div class="task-modal-actions">
      <button id="saveTaskEditBtn">保存</button>
      <button id="deleteTaskEditBtn" type="button">削除</button>
      <button id="cancelTaskEditBtn" type="button">キャンセル</button>
    </div>
  </div>
</div>

  <script type="module" src="/task.js"></script>
</body>
</html>
