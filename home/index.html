<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Home | notia</title>

  <meta
    name="description"
    content="最近書いたメモや記録をまとめて確認できるnotiaのホームページです。"
  />

  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
</head>

<body class="home-page">

  <div id="commonHeader"></div>
  
  <header class="home-header">
    <div>
      <p class="label">NOTIA</p>
      <h1>Home</h1>
      <p class="lead">最近書いたメモや記録をまとめて表示します。</p>
    </div>

    <div class="home-header-actions">
      <a href="/account/" class="ghost-link">アカウント設定</a>
      <a href="/" class="ghost-link">トップへ</a>
      <button id="logoutBtn" class="small-btn hidden">ログアウト</button>
    </div>
  </header>

  <main class="home-main">
    <section class="home-user-card">
      <div>
        <p class="section-label">LOGIN</p>
        <h2 id="userName">ログイン確認中...</h2>
        <p id="userStatus">データを読み込んでいます。</p>
      </div>

      <button id="loginBtn" class="primary-btn">Googleでログイン</button>
    </section>

    <section id="homeContent" class="home-content hidden">
      <section class="home-section">
        <div class="home-section-head">
          <div>
            <p class="section-label">RECENT</p>
            <h2>最近の記録</h2>
          </div>

          <button id="reloadBtn" class="small-btn icon-btn" type="button" aria-label="再読み込み">
  ↻
</button>
        </div>

        <div id="recentTimeline" class="recent-timeline"></div>
      </section>

      <section class="home-grid">
        <article class="home-section-card">
          <div class="home-section-head mini">
            <h2>クイックメモ</h2>
            <a href="/quick/">開く</a>
          </div>

          <div id="quickMemoList" class="home-list"></div>
        </article>

        <article class="home-section-card">
          <div class="home-section-head mini">
            <h2>タスク</h2>
            <a href="/task/">開く</a>
          </div>

          <div id="taskList" class="home-list"></div>
        </article>

        <article class="home-section-card">
          <div class="home-section-head mini">
            <h2>共有メモ</h2>
            <a href="/shared/">開く</a>
          </div>

          <div id="sharedMemoList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
          <div class="home-section-head mini">
            <h2>通常メモ</h2>
            <a href="/normal/">開く</a>
          </div>

          <div id="normalMemoList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
          <div class="home-section-head mini">
            <h2>日記</h2>
            <a href="/diary/">開く</a>
          </div>

          <div id="diaryList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
          <div class="home-section-head mini">
            <h2>夢日記</h2>
            <a href="/dream/">開く</a>
          </div>

          <div id="dreamList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
          <div class="home-section-head mini">
            <h2>曲メモ</h2>
            <a href="/music/">開く</a>
          </div>

          <div id="musicList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
          <div class="home-section-head mini">
            <h2>ストーリー</h2>
            <a href="/story/">開く</a>
          </div>

          <div id="storyList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
          <div class="home-section-head mini">
            <h2>人物帳</h2>
            <a href="/people/">開く</a>
          </div>

          <div id="peopleList" class="home-list"></div>
        </article>

        <article class="home-section-card admin-only hidden">
  <div class="home-section-head mini">
    <h2>画像メモ</h2>
    <a href="/image/">開く</a>
  </div>

  <div id="imageMemoList" class="home-list"></div>
</article>
        
      </section>
    </section>
  </main>

  <script type="module" src="/home.js"></script>
  <script type="module" src="/header.js"></script>
</body>
</html>
